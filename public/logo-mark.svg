<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Checkloom mark: a hexagon (verification stamp) containing woven
       "weft" thread lines (loom) crossed by a bold checkmark (verified). -->
  <polygon points="50,4 90,27 90,73 50,96 10,73 10,27"
           fill="none" stroke="#B3382A" stroke-width="4"/>

  <!-- woven thread lines (loom) -->
  <line x1="22" y1="34" x2="78" y2="34" stroke="#2E7D4F" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="22" y1="50" x2="78" y2="50" stroke="#2E7D4F" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="22" y1="66" x2="78" y2="66" stroke="#2E7D4F" stroke-width="3.5" stroke-linecap="round"/>

  <!-- checkmark (verified) -->
  <path d="M28 51 L44 67 L74 33" fill="none" stroke="#F2F0EA" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
